<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Syntrix — One moment</title>
  <link rel="icon" type="image/png" sizes="192x192" href="assets/syntrix-favicon.png" />
  <link rel="stylesheet" href="assets/auth-ui.css" />
  <link rel="stylesheet" href="assets/css/mira-widget.css?v=mira19" />
  <style>.auth-callback-center { min-height: 100vh; display: grid; place-items: center; padding: 24px; }</style>
</head>
<body class="auth-page">
  <div class="auth-bg" aria-hidden="true"></div>
  <div class="auth-glow" aria-hidden="true"></div>
  <div class="auth-callback-center">
    <div class="auth-card" style="text-align:center;padding:36px 28px;">
      <div class="auth-pill" style="margin:0 auto 16px;justify-content:center;">
        <span class="auth-pill-dot"></span>
        Syntrix
      </div>
      <h1 style="font-size:22px;margin:0 0 8px;">Finishing sign-in</h1>
      <p class="auth-lede" style="margin:0;">Hang on — redirecting you now.</p>
      <p style="margin-top:20px;font-size:14px;color:var(--text-mid);">
        Stuck? <a href="login.html" style="color:var(--cyan);font-weight:600;text-decoration:none;">Try sign-in again</a>
        · <a href="index.html" style="color:var(--cyan);font-weight:600;text-decoration:none;">Home</a>
      </p>
    </div>
  </div>
  <script src="assets/js/auth-config.js"></script>
  <script src="assets/js/auth-overlay.js"></script>
  <script src="https://cdn.auth0.com/js/auth0-spa-js/2.1/auth0-spa-js.production.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/mira-chat.js?v=mira21"></script>
  <script src="assets/js/mira-boot.js?v=mira21"></script>
  <script>
    (async () => {
      try {
        await window.SyntrixAuth.init();
      } catch (e) {
        window.location.replace('login.html');
      }
    })();
  </script>
</body>
</html>
