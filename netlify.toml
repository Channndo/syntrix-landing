# Build injects assets/js/auth-config.js from env: AUTH0_DOMAIN, AUTH0_CLIENT_ID, AUTH0_AUDIENCE, SYNTRIX_API_BASE
# Option B — edit assets/js/auth-overlay.js in git (SPA domain + client ID are public)
# Waitlist / signup: signup-notify.mjs — optional APPS_SCRIPT_CONSUMER_URL + APPS_SCRIPT_ENTERPRISE_URL (two Sheets).
# Secrets never belong in git.
#
# Deploy: push `main` to github.com/Channndo/syntrix-landing — Netlify builds from Git (no CLI required).
# If `npx netlify deploy` says JSONHTTPError: Forbidden, that is account/auth — not this file:
#   npm run deploy:help
# Common causes: NETLIFY_AUTH_TOKEN set to another user’s or expired token; logged into CLI as a user
# without deploy access to this site; team SSO. Fix: unset NETLIFY_AUTH_TOKEN, netlify logout/login,
# or use the site’s linked Git workflow only.
#
# Same-origin API proxy (netlify dev + production): browser hits /scanner-api/* here; Netlify forwards to the scanner.
# api.js: same-origin /scanner-api on localhost and *.netlify.app; production syntrix.solutions calls the API host directly (avoids Netlify proxy timeouts on long MIRA chats).
[[redirects]]
  from = "/scanner-api/*"
  to = "https://api.syntrix.solutions/:splat"
  status = 200
  force = true

# Client-visible rate-limit signals (Syntrix RATE-01 and similar tools look for X-RateLimit-*).
# Abuse is still handled by Netlify/CDN; these headers document policy and satisfy health checks.
[[headers]]
  for = "/*"
  [headers.values]
    X-RateLimit-Limit = "6000"
    X-RateLimit-Remaining = "6000"
    X-RateLimit-Policy = "netlify-static"

[build]
  command = "npm run build"
  publish = "."

[functions]
  directory = "netlify/functions"

# Short TTL so CSS/JS updates reach browsers soon after deploy (filenames are not hashed).
[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"
