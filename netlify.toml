# Build injects assets/js/auth-config.js from env: AUTH0_DOMAIN, AUTH0_CLIENT_ID, AUTH0_AUDIENCE, SYNTRIX_API_BASE
# Option B — edit assets/js/auth-overlay.js in git (SPA domain + client ID are public)
# Waitlist (pick one): WAITLIST_SCANNER_INGEST_URL + WAITLIST_INGEST_SECRET (pairs with scanner SYNTRIX_WAITLIST_INGEST_SECRET),
# or SIGNUP_WEBHOOK_URL, or Resend, or APPS_SCRIPT_URL — netlify/functions/signup-notify.mjs
[build]
  command = "npm run build"
  publish = "."

[functions]
  directory = "netlify/functions"
