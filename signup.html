<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Syntrix Sign Up</title>
  <link rel="icon" type="image/png" href="assets/syntrix-favicon.png" />
</head>
<body style="font-family:system-ui;background:#060b14;color:#e5eefb;display:grid;place-items:center;min-height:100vh;">
  <main style="max-width:480px;padding:32px;border:1px solid #1a2942;border-radius:12px;background:#0a1320;">
    <h1 style="margin-top:0;">Create your Syntrix account</h1>
    <p>Sign up securely to run authenticated scans and manage subscriptions.</p>
    <p id="auth-error" style="color:#f87171;font-size:14px;display:none;"></p>
    <p id="auth-missing-config" style="color:#fbbf24;font-size:13px;line-height:1.5;display:none;">
      Auth0 is not configured yet. Edit <code style="color:#22d3ee;">assets/js/auth-config.js</code>
      and redeploy. Add callback URL <code style="color:#22d3ee;">https://syntrix.solutions/auth-callback.html</code> in Auth0.
    </p>
    <button id="signup-btn" type="button" style="padding:10px 16px;cursor:pointer;">Continue to sign up</button>
    <p style="margin-top:16px;"><a href="index.html" style="color:#22d3ee;">Back to home</a></p>
  </main>

  <script src="assets/js/auth-config.js"></script>
  <script src="https://cdn.auth0.com/js/auth0-spa-js/2.1/auth0-spa-js.production.js"></script>
  <script src="assets/js/auth.js"></script>
  <script>
    (async () => {
      const btn = document.getElementById('signup-btn');
      const err = document.getElementById('auth-error');
      const missing = document.getElementById('auth-missing-config');

      await window.SyntrixAuth.init();

      if (!window.SyntrixAuth.isConfigured()) {
        missing.style.display = 'block';
        btn.disabled = true;
        btn.style.opacity = '0.5';
        return;
      }

      btn.addEventListener('click', async () => {
        err.style.display = 'none';
        try {
          await window.SyntrixAuth.login('signup', `${window.location.origin}/index.html`);
        } catch (e) {
          err.textContent = e.message || String(e);
          err.style.display = 'block';
        }
      });
    })();
  </script>
</body>
</html>
