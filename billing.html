<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Billing · Syntrix</title>
  <link rel="icon" type="image/png" href="assets/syntrix-favicon.png" />
  <link rel="stylesheet" href="assets/auth-ui.css" />
</head>
<body class="auth-page">
  <div class="auth-bg" aria-hidden="true"></div>
  <div class="auth-glow" aria-hidden="true"></div>

  <nav class="auth-nav">
    <a class="brand-auth" href="index.html">
      <img src="assets/syntrix-logo-solid.png" alt="" width="40" height="40" />
      SYNTRIX
    </a>
    <a class="link-muted" href="account.html">Account</a>
  </nav>

  <main class="auth-main">
    <div class="auth-card" style="max-width:520px;">
      <div class="auth-pill">
        <span class="auth-pill-dot"></span>
        Plans
      </div>
      <h1 style="margin-bottom:12px;">Choose a plan</h1>
      <p class="auth-lede" style="margin-bottom:24px;">
        Subscriptions unlock automated scans and private results. You’ll check out securely with our payment provider.
      </p>
      <div id="auth-error" class="auth-msg auth-msg--error" role="alert"></div>
      <div id="billing-actions" hidden class="auth-action-row">
        <button id="buy-pro" type="button" class="auth-btn-primary" style="width:auto;padding:12px 20px;">Pro</button>
        <button id="buy-team" type="button" class="auth-btn-primary" style="width:auto;padding:12px 20px;">Team</button>
      </div>
      <div class="auth-footer-links" style="margin-top:28px;text-align:left;">
        <a href="index.html">← Back to Syntrix</a>
      </div>
    </div>
  </main>

  <script>window.SYNTRIX_API_BASE = 'https://api.syntrix.solutions';</script>
  <script src="assets/js/auth-config.js"></script>
  <script src="assets/js/auth-overlay.js"></script>
  <script src="https://cdn.auth0.com/js/auth0-spa-js/2.1/auth0-spa-js.production.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/billing.js"></script>
  <script>
    (async () => {
      const errEl = document.getElementById('auth-error');
      const actions = document.getElementById('billing-actions');

      await window.SyntrixAuth.init();

      if (!window.SyntrixAuth.isConfigured()) {
        errEl.style.display = 'block';
        errEl.style.borderColor = 'var(--line)';
        errEl.style.background = 'rgba(15, 26, 44, 0.5)';
        errEl.style.color = 'var(--text-mid)';
        errEl.textContent =
          'Sign-in isn’t connected on this deployment yet, so billing can’t start. Email hello@syntrix.solutions or try again after the next site update.';
        return;
      }

      const authed = await window.SyntrixAuth.isAuthenticated();
      if (!authed) {
        try {
          await window.SyntrixAuth.login('login', `${window.location.origin}${window.location.pathname}`);
        } catch (e) {
          errEl.style.display = 'block';
          errEl.textContent = e.message || String(e);
        }
        return;
      }

      actions.hidden = false;

      document.getElementById('buy-pro').addEventListener('click', async () => {
        try {
          await window.SyntrixBilling.startCheckout('pro');
        } catch (err) {
          alert(err.message || String(err));
        }
      });
      document.getElementById('buy-team').addEventListener('click', async () => {
        try {
          await window.SyntrixBilling.startCheckout('team');
        } catch (err) {
          alert(err.message || String(err));
        }
      });
    })();
  </script>
</body>
</html>
