<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account · Syntrix</title>
  <link rel="icon" type="image/png" href="assets/syntrix-favicon.png" />
  <link rel="stylesheet" href="assets/auth-ui.css" />
</head>
<body class="auth-page">
  <div class="auth-bg" aria-hidden="true"></div>
  <div class="auth-glow" aria-hidden="true"></div>

  <nav class="auth-nav">
    <a class="brand-auth" href="index.html">
      <img src="assets/syntrix-logo-solid.png" alt="" width="40" height="40" />
      SYNTRIX
    </a>
    <a class="link-muted" href="billing.html">Billing</a>
  </nav>

  <main class="auth-main">
    <div class="auth-card" style="max-width:520px;">
      <div class="auth-pill">
        <span class="auth-pill-dot"></span>
        Account
      </div>
      <h1 style="margin-bottom:16px;">Your account</h1>
      <p id="profile" class="auth-lede" style="margin-bottom:24px;">Loading…</p>
      <div id="auth-error" class="auth-msg auth-msg--error" role="alert"></div>
      <div id="acct-actions" hidden class="auth-action-row">
        <button id="manage-billing" type="button" class="auth-btn-primary" style="width:auto;padding:12px 20px;">Manage billing</button>
        <button id="logout-btn" type="button" class="auth-btn-primary auth-outline-btn">Sign out</button>
      </div>
      <div class="auth-footer-links" style="margin-top:28px;text-align:left;">
        <a href="index.html">← Back to Syntrix</a>
      </div>
    </div>
  </main>

  <script>window.SYNTRIX_API_BASE = 'https://api.syntrix.solutions';</script>
  <script src="assets/js/auth-config.js"></script>
  <script src="assets/js/auth-overlay.js"></script>
  <script src="https://cdn.auth0.com/js/auth0-spa-js/2.1/auth0-spa-js.production.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/billing.js"></script>
  <script>
    (async () => {
      const profileEl = document.getElementById('profile');
      const errEl = document.getElementById('auth-error');
      const actions = document.getElementById('acct-actions');

      await window.SyntrixAuth.init();

      if (!window.SyntrixAuth.isConfigured()) {
        profileEl.textContent =
          'We’re finishing account connections on this deployment. Try again shortly, or email hello@syntrix.solutions for help.';
        return;
      }

      const authed = await window.SyntrixAuth.isAuthenticated();
      if (!authed) {
        try {
          await window.SyntrixAuth.login('login', `${window.location.origin}${window.location.pathname}`);
        } catch (e) {
          errEl.textContent = e.message || String(e);
          errEl.style.display = 'block';
          profileEl.textContent = 'Couldn’t start sign-in.';
        }
        return;
      }

      const profile = await window.SyntrixAuth.getProfile();
      profileEl.textContent = `Signed in as ${profile?.email || profile?.name || 'you'}.`;
      actions.hidden = false;

      document.getElementById('manage-billing').addEventListener('click', async () => {
        try {
          await window.SyntrixBilling.openPortal();
        } catch (err) {
          alert(err.message || String(err));
        }
      });
      document.getElementById('logout-btn').addEventListener('click', () => window.SyntrixAuth.logout());
    })();
  </script>
</body>
</html>
